# Railway/Nixpacks: slim install + Python 3.11 (avoid 3.13 wheel issues).
# App imports use `from src.*` — repo root must be on PYTHONPATH (see railway.toml).

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.install]
cmds = ["python -m pip install -r requirements-railway.txt"]

[start]
cmd = "PYTHONPATH=. python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
