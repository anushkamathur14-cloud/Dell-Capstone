# Pin Python for consistent wheels; install the package from pyproject.toml.

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.install]
cmds = ["python -m pip install --upgrade pip", "python -m pip install -e ."]

[start]
cmd = "PYTHONPATH=. python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
