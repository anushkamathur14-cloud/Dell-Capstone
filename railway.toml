# Railway config — FastAPI lives at src/api/main.py (not repo root).
# See docs/DEPLOYMENT.md for env vars and health checks.

[build]
builder = "nixpacks"

[deploy]
startCommand = "PYTHONPATH=. python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
