# Bind to Railway $PORT — must match Networking → public domain port (often 8080).
# Build uses the root Dockerfile (reliable for heavy scientific Python deps).

[build]
builder = "DOCKERFILE"

[env]
# Use Lovable-wide CORS regex (preview + published). Override in UI only if debugging.
CORS_FORCE_LOVABLE_REGEX = "true"
CORS_ALLOW_ORIGINS = "*"

[deploy]
startCommand = "sh scripts/run_api_prod.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
